name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  # Keep in lockstep with ci.yml: the manifest needs 0.0.102
  # ([target.'cfg(...)'.build.flags], mcpp#258). The previous `xlings install`
  # path delivered whatever mcpp xlings shipped (0.0.101 at the time), which
  # rejects cfg-section flag tables — the v0.0.9 and v0.0.10 release runs both
  # failed on exactly that skew, while the 5-leg CI (pinned) was green.
  MCPP_VERSION: "0.0.102"

jobs:
  verify-and-release:
    name: verify (linux) + GitHub Release
    runs-on: ubuntu-latest
    # Cold source-build of the vendored OpenCV + transitive compat.ffmpeg (see ci.yml).
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Same pinned install as ci.yml: the release tarball seeds
      # ~/.mcpp/registry (nasm included), no xlings needed.
      - name: Download mcpp
        shell: bash
        env:
          MCPP_ARCHIVE: mcpp-${{ env.MCPP_VERSION }}-linux-x86_64.tar.gz
          MCPP_ROOT: mcpp-${{ env.MCPP_VERSION }}-linux-x86_64
        run: |
          curl -L -fsS -o "$MCPP_ARCHIVE" \
            "https://github.com/mcpp-community/mcpp/releases/download/v${MCPP_VERSION}/${MCPP_ARCHIVE}"
          tar -xzf "$MCPP_ARCHIVE"
          root="$PWD/$MCPP_ROOT"
          mkdir -p "$HOME/.mcpp/registry"
          cp -a "$root/registry/." "$HOME/.mcpp/registry/"
          echo "$root/bin" >> "$GITHUB_PATH"

      - name: Set default toolchain
        run: |
          mcpp toolchain install gcc 16.1.0
          mcpp toolchain default gcc@16.1.0
          mcpp --version

      - name: Build + test at the tagged revision
        run: |
          mcpp build
          mcpp test

      - name: Verify tag matches package version
        run: |
          pkg_ver="$(sed -n 's/^version *= *"\(.*\)"/\1/p' mcpp.toml | head -1)"
          tag="${GITHUB_REF_NAME#v}"
          test "$pkg_ver" = "$tag" || { echo "tag $GITHUB_REF_NAME != package version $pkg_ver"; exit 1; }

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "opencv-m $GITHUB_REF_NAME" \
            --generate-notes \
            --verify-tag

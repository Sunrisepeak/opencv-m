[package]
name        = "opencv"
version     = "0.0.7"
description = "OpenCV 5.0.0 vendored + C++23 module layer — import opencv.cv; (API and habits unchanged, just no headers). Single repo: full source build carried by this manifest, frozen per-OS config snapshots in gen/, no compat.opencv dependency."
license     = "MIT"

# ─────────────────────────────────────────────────────────────────────────────
# Single-repo build (ported from mcpp-index pkgs/c/compat.opencv.lua @8692bb26,
# see .agents/docs/2026-07-21-vendor-single-repo-plan.md):
#   third_party/opencv-5.0.0/  pinned upstream source (zero patches)
#   gen/common, gen/<os>/      frozen config snapshots as real files
#   build.mcpp                 per-OS include dirs + per-OS dnn sources
#                              (gen/<os>/DNN_SOURCES.txt) + unifont embed
# Per-glob defines below scope __OPENCV_BUILD-family flags to third_party/**
# and gen/** TUs — src/*.cppm module-layer TUs never see them. The flag table
# is the UNION of the linux+macosx snapshots (identical or disjoint globs;
# arch-specific per-glob defines are hoisted to per-OS cflags below, each name
# grep-verified to be read only by its own group). WINDOWS is parked: it needs
# DIFFERENT defines on the SAME globs (WIN32/_CRT_* adds + unix HAVE_* drops),
# which the manifest cannot express until mcpp grows [target.'cfg(os)'] flags
# (issue filed; parked tables in the port fragments).
# ─────────────────────────────────────────────────────────────────────────────

[build]
# Module-layer surface (opencv.cv umbrella + per-module interfaces). dnn.cppm
# is NOT listed here on purpose: it needs <opencv2/dnn.hpp> compiled in, so the
# dnn feature adds it and import opencv.dnn; fails (correctly) without it.
# The OpenCV library TUs are per-OS -> [target.'cfg(<os>)'.build].sources.
sources = [
    "src/opencv.cppm",
    "src/cv.cppm",
    "src/core.cppm",
    "src/imgproc.cppm",
    "src/imgcodecs.cppm",
    "src/videoio.cppm",
    "src/highgui.cppm",
    "src/flann.cppm",
    "src/geometry.cppm",
]
# Public include dirs (propagate to consumers): the module layer's include/,
# gen/common (opencv2/opencv_modules.hpp — the ONE consumer-visible generated
# header) and the vendored OpenCV trees. The per-OS gen/<os> snapshot dirs are
# PRIVATE and emitted by build.mcpp (gen/<os>/INCLUDE_DIRS.txt).
include_dirs = [
        "include",
        "gen/common",
        "third_party/opencv-5.0.0",
        "third_party/opencv-5.0.0/3rdparty/dlpack/include",
        "third_party/opencv-5.0.0/3rdparty/libjpeg-turbo/src",
        "third_party/opencv-5.0.0/3rdparty/libjpeg-turbo/simd/nasm",
        "third_party/opencv-5.0.0/3rdparty/libjpeg-turbo/simd/x86_64",
        "third_party/opencv-5.0.0/3rdparty/zlib",
        "third_party/opencv-5.0.0/modules/core/include",
        "third_party/opencv-5.0.0/modules/flann/include",
        "third_party/opencv-5.0.0/modules/geometry/include",
        "third_party/opencv-5.0.0/modules/imgproc/include",
        "third_party/opencv-5.0.0/3rdparty/mlas/inc",
        "third_party/opencv-5.0.0/3rdparty/mlas/lib",
        "third_party/opencv-5.0.0/modules/dnn/include",
        "third_party/opencv-5.0.0/modules/dnn/misc/caffe",
        "third_party/opencv-5.0.0/modules/dnn/misc/tensorflow",
        "third_party/opencv-5.0.0/modules/dnn/misc/onnx",
        "third_party/opencv-5.0.0/modules/dnn/misc/tflite",
        "third_party/opencv-5.0.0/3rdparty/flatbuffers/include",
        "third_party/opencv-5.0.0/3rdparty/protobuf/src",
        "third_party/opencv-5.0.0/3rdparty/libpng",
        "third_party/opencv-5.0.0/modules/imgcodecs/include",
        "third_party/opencv-5.0.0/modules/videoio/include",
        "third_party/opencv-5.0.0/modules/highgui/include",
    ]

[[build.flags]]
glob = "**/modules/core/**"
defines = [
    "HAVE_STDARG_H=1",
    "HAVE_UNISTD_H=1",
    "NDEBUG",
    "_USE_MATH_DEFINES",
    "__OPENCV_BUILD=1",
    "__STDC_CONSTANT_MACROS",
    "__STDC_FORMAT_MACROS",
    "__STDC_LIMIT_MACROS",
]


name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  linux:
    name: mcpp (ubuntu-latest, required)
    runs-on: ubuntu-latest
    # This job source-builds OpenCV 5 (+ transitive compat.ffmpeg) on a cold
    # runner TWICE: once for the default base+videoio profile, then the
    # `--features dnn,unifont` step re-keys the store into a second variant
    # (base + dnn + unifont, dnn dominating). ~50 min each cold; 150 leaves
    # headroom. The ~/.mcpp registry cache would amortize this, but it is not
    # persisted here.
    timeout-minutes: 150
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # No apt nasm: compat.opencv's NASM .asm units (jpeg-turbo SIMD, core AVX)
      # are covered by mcpp's synchronous nasm bootstrap via xlings (mcpp#232,
      # floor 0.0.98) — the same drop already proven in mcpp-index and ffmpeg-m.
      - name: Install Xlings
        env:
          XLINGS_NON_INTERACTIVE: 1
        run: |
          curl -fsSL https://raw.githubusercontent.com/openxlings/xlings/refs/heads/main/tools/other/quick_install.sh | bash
          echo "$HOME/.xlings/subos/current/bin" >> "$GITHUB_PATH"

      - name: Install project tools
        run: |
          xlings update
          xlings install

      - name: Set default toolchain
        run: |
          mcpp toolchain install gcc 16.1.0
          mcpp toolchain default gcc@16.1.0
          mcpp --version

      - name: Build library (via compat.opencv source build)
        run: mcpp build

      - name: Run tests (API surface + macros mix + codec roundtrips)
        run: mcpp test

      # Optional features (mcpp#243 dep/feat forwarding): dnn adds the
      # opencv.dnn module interface + forwards compat.opencv/dnn; unifont
      # forwards compat.opencv/unifont. Built together = one extra OpenCV
      # variant (base + dnn + unifont). The feature-gated tests are no-ops
      # in the default `mcpp test` above, so this is where they run.
      - name: Run feature tests (dnn + unifont module interfaces)
        run: mcpp test --features dnn,unifont

      - name: Run probe example (path-dep consumer)
        run: |
          cd examples/probe
          mcpp run

      - name: Run gray_pipeline example
        run: |
          cd examples/gray_pipeline
          mcpp run

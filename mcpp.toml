[dependencies]
# FFmpeg videoio backend — stays a compat package (separate unification
# decision). Source-built by mcpp for whatever target/toolchain is active.
compat.ffmpeg = "8.1.2"

[dev-dependencies]
compat.gtest = "1.15.2"

[features]
unifont = { defines = ["HAVE_UNIFONT"] }

[features.dnn]
defines = [
    "HAVE_OPENCV_DNN",
]
# OS-neutral dnn sources; per-OS ISA dispatch/mlas/stubs are injected by
# build.mcpp from gen/<os>/DNN_SOURCES.txt (manifest [features] cannot be
# per-OS - descriptor-only #253 semantics).
sources = [
        "src/dnn.cppm",
        "third_party/opencv-5.0.0/3rdparty/protobuf/src/google/protobuf/*.cc",
        "third_party/opencv-5.0.0/3rdparty/protobuf/src/google/protobuf/io/*.cc",
        "third_party/opencv-5.0.0/3rdparty/protobuf/src/google/protobuf/stubs/*.cc",
        "third_party/opencv-5.0.0/modules/dnn/misc/caffe/opencv-caffe.pb.cc",
        "third_party/opencv-5.0.0/modules/dnn/misc/onnx/opencv-onnx.pb.cc",
        "third_party/opencv-5.0.0/modules/dnn/misc/tensorflow/*.cc",
        "third_party/opencv-5.0.0/modules/dnn/src/*.cpp",
        "third_party/opencv-5.0.0/modules/dnn/src/caffe/caffe_io.cpp",
        "third_party/opencv-5.0.0/modules/dnn/src/int8layers/*.cpp",
        "third_party/opencv-5.0.0/modules/dnn/src/layers/*.cpp",
        "third_party/opencv-5.0.0/modules/dnn/src/layers/cpu_kernels/*.cpp",
        "third_party/opencv-5.0.0/modules/dnn/src/onnx/*.cpp",
        "third_party/opencv-5.0.0/modules/dnn/src/tensorflow/*.cpp",
        "third_party/opencv-5.0.0/modules/dnn/src/tflite/tflite_importer.cpp",
        "third_party/opencv-5.0.0/modules/dnn/src/tokenizer/*.cpp",
    ]


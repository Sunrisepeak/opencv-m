[package]
name        = "opencv"
version     = "0.0.1"
description = "C++23 module layer for OpenCV 5 — import opencv.cv; (API and habits unchanged, just no headers)"
license     = "MIT"

[build]
sources      = ["src/**/*.cppm"]
include_dirs = ["include"]

[dependencies]
compat.opencv5 = "5.0.0"

[dev-dependencies]
compat.gtest = "1.15.2"

[targets.opencv]
kind = "lib"

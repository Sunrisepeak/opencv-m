name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  # 0.0.102 (mcpp#258): OS-conditional [target.'cfg(os)'.build].flags, which
  # this manifest uses to keep -msse3 on the library TUs but off the module
  # interfaces. 0.0.101 rejects `flags` under a cfg section. (0.0.102 also
  # carries #261 — the windows scan-deps command-line fix.) The pin tracks
  # the latest release; 0.0.103 adds the mcpplibs index org migration +
  # per-repo artifact adoption (mcpp#267/#269) — no manifest-grammar change,
  # the package floor stays 0.0.102.
  MCPP_VERSION: "0.0.103"

jobs:
  # ── Platform × toolchain matrix ─────────────────────────────────────────
  # Every leg source-builds the vendored OpenCV 5 (+ compat.ffmpeg) cold:
  # ~2700 TUs. The ~/.mcpp/registry cache carries toolchains and the built
  # compat.ffmpeg across runs; timeout is sized for the COLD path.
  #
  # All five legs are required. Notes on the two that were experimental:
  #   linux-musl  — needed mcpp-index#110 (compat.ffmpeg
  #                 -Wno-error=incompatible-pointer-types for musl's ioctl
  #                 signature); merged as e83ed49, green since.
  #   windows     — per-glob flags live in [target.'cfg(windows)'.build.flags]
  #                 (mcpp#258, landed in 0.0.102), still keyed on the
  #                 gen/windows/tu/w*/ stub paths; removing the stub layer
  #                 itself is tracked in #17.
  test:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 150
    continue-on-error: ${{ matrix.experimental }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-gcc
            os: ubuntu-latest
            suffix: linux-x86_64
            ext: tar.gz
            mcpp: bin/mcpp
            setup: |
              mcpp toolchain install gcc 16.1.0
              mcpp toolchain default gcc@16.1.0
            experimental: false
            features: true
            examples: true
          - name: linux-llvm-22
            os: ubuntu-latest
            suffix: linux-x86_64
            ext: tar.gz
            mcpp: bin/mcpp
            # gcc first: `mcpp toolchain install llvm` does not pull the
            # xim glibc runtime its binaries are patchelf'd against (their
            # ELF interpreter lives under xim-x-glibc/2.39 → exec 127 on a
            # bare runner); the gcc install brings it.
            # mcpp packaging gap: mcpp-community/mcpp#259.
            setup: |
              mcpp toolchain install gcc 16.1.0
              mcpp toolchain install llvm 22.1.8
              mcpp toolchain default llvm@22.1.8
            experimental: false
            features: false
            examples: false
          - name: linux-musl-static
            os: ubuntu-latest
            suffix: linux-x86_64
            ext: tar.gz
            mcpp: bin/mcpp
            setup: |
              mcpp toolchain install gcc 16 --target x86_64-linux-musl
              mcpp toolchain default gcc@16.1.0 --target x86_64-linux-musl
            experimental: false
            features: false
            examples: false
          - name: macos-llvm
            os: macos-15
            suffix: macosx-arm64
            ext: tar.gz
            mcpp: bin/mcpp
            setup: ""   # mcpp resolves its macOS default (llvm) itself
            experimental: false
            features: false
            examples: false
          - name: windows-llvm
            os: windows-latest
            suffix: windows-x86_64
            ext: zip
            mcpp: bin/mcpp.exe
            setup: ""
            experimental: false
            features: false
            examples: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore mcpp registry cache
        uses: actions/cache@v4
        with:
          # Holds toolchains AND built deps (compat.ffmpeg, gtest), so a
          # repeat run rebuilds little. Keyed per leg; prefix-restores across
          # manifest changes.
          path: ~/.mcpp/registry
          key: mcpp-registry-${{ matrix.name }}-${{ env.MCPP_VERSION }}-${{ hashFiles('mcpp.toml', '.github/workflows/ci.yml') }}
          restore-keys: |
            mcpp-registry-${{ matrix.name }}-${{ env.MCPP_VERSION }}-

      - name: Download mcpp
        shell: bash
        env:
          MCPP_ARCHIVE: mcpp-${{ env.MCPP_VERSION }}-${{ matrix.suffix }}.${{ matrix.ext }}
          MCPP_ROOT: mcpp-${{ env.MCPP_VERSION }}-${{ matrix.suffix }}
        run: |
          curl -L -fsS -o "$MCPP_ARCHIVE" \
            "https://github.com/mcpp-community/mcpp/releases/download/v${MCPP_VERSION}/${MCPP_ARCHIVE}"
          case "$MCPP_ARCHIVE" in
            *.zip) powershell -NoProfile -Command "Expand-Archive -Force -Path '${MCPP_ARCHIVE}' -DestinationPath '.'" ;;
            *)     tar -xzf "$MCPP_ARCHIVE" ;;
          esac
          root="$PWD/$MCPP_ROOT"
          mkdir -p "$HOME/.mcpp/registry"
          cp -a "$root/registry/." "$HOME/.mcpp/registry/"
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            echo "$(cygpath -m "$root/bin")" >> "$GITHUB_PATH"
          else
            echo "$root/bin" >> "$GITHUB_PATH"
          fi

      - name: Set up toolchain
        if: matrix.setup != ''
        shell: bash
        run: |
          ${{ matrix.setup }}
          mcpp --version

      - name: Template lint
        if: matrix.features
        shell: bash
        # A scaffold ships INSIDE the release tarball and is never compiled by
        # this CI (a path-dep consumer cold-rebuilds all of OpenCV, ~40 min),
        # so two static checks stand in for the missing build:
        #   1. Placeholders: mcpp's renderer knows exactly {{project.name}} /
        #      {{self.name}} / {{self.version}} — anything else ships literally.
        #   2. stdio-macro / import-std footgun: `import std;` does NOT export
        #      the C macros stderr/stdout/stdin (modules never export macros),
        #      so a template TU touching one must also `#include <cstdio>`.
        #      v0.0.7's template used std::println(stderr, …) under a bare
        #      `import std;` and scaffolded non-compiling code; this guards it.
        run: |
          bad=$(grep -rno '{{[^}]*}}' templates/ | grep -v -E '\{\{(project\.name|self\.name|self\.version)\}\}' || true)
          if [ -n "$bad" ]; then echo "unknown template placeholders:"; echo "$bad"; exit 1; fi
          fail=0
          while IFS= read -r tu; do
            grep -qE '\bimport[[:space:]]+std\b' "$tu" || continue
            if grep -qE '\b(stderr|stdout|stdin)\b' "$tu" && ! grep -qE '#[[:space:]]*include[[:space:]]*<cstdio>' "$tu"; then
              echo "::error file=$tu::uses a <cstdio> macro (stderr/stdout/stdin) under 'import std;' without '#include <cstdio>' — modules do not export macros, so the scaffold will not compile"
              fail=1
            fi
          done < <(find templates -name '*.cpp.in' -o -name '*.cc.in' -o -name '*.cpp' -o -name '*.cc')
          exit $fail

      - name: Build
        shell: bash
        run: mcpp build

      # Guard the module-interface BMIs against non-baseline target features.
      # A src/*.cppm compiled with -msse3/-mavx/-march=… bakes that feature
      # into opencv.<mod>.pcm; a consumer TU compiled at plain baseline then
      # cannot load it (clang -Wmodule-file-config-mismatch → "use of
      # undeclared identifier 'cv'"). The library .cpp legitimately need SSE3
      # (OpenCV's x86_64 baseline), so it is applied per-glob to the library
      # TUs only — this asserts it never leaked back onto an interface unit.
      - name: Module-interface baseline guard
        if: matrix.features
        shell: bash
        run: |
          ninja=$(find target -name build.ninja | head -1)
          [ -n "$ninja" ] || { echo "no build.ninja found"; exit 1; }
          bad=0
          for m in opencv cv core imgproc imgcodecs videoio highgui flann geometry; do
            hits=$(grep -E "[ =/]src/${m}\.cppm" "$ninja" | grep -oE '\-m(sse[0-9._]*|avx[0-9_]*|arch=[^ ]+)' | sort -u || true)
            if [ -n "$hits" ]; then
              echo "::error::src/${m}.cppm carries non-baseline target feature(s): $hits — its BMI will be unloadable by baseline consumers"
              bad=1
            fi
          done
          [ $bad -eq 0 ] && echo "module interfaces are baseline (no target-feature flags)."
          exit $bad

      - name: Test
        shell: bash
        run: mcpp test

      - name: Feature tests (dnn + unifont module interfaces)
        if: matrix.features
        shell: bash
        run: mcpp test --features dnn,unifont

      # NOTE examples are exercised locally, not here: each one is a path-dep
      # consumer that cold-rebuilds the whole vendored OpenCV (+ffmpeg) in its
      # own target/ (~40 min per example on a 4-core runner) while adding
      # little over what `mcpp test` already covers. Revisit if mcpp learns
      # to share dep artifacts with path-dep consumers.

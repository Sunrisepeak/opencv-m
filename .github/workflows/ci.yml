name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  linux:
    name: mcpp (ubuntu-latest, required)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # compat.opencv5 carries 27 NASM .asm units; mcpp resolves nasm
      # PATH-first — ubuntu ships nasm >= 2.16 (self-bootstrap fallback
      # exists but is still racy pre mcpp#232 fix).
      - name: Install nasm
        run: sudo apt-get update && sudo apt-get install -y nasm && nasm --version

      - name: Install Xlings
        env:
          XLINGS_NON_INTERACTIVE: 1
        run: |
          curl -fsSL https://raw.githubusercontent.com/openxlings/xlings/refs/heads/main/tools/other/quick_install.sh | bash
          echo "$HOME/.xlings/subos/current/bin" >> "$GITHUB_PATH"

      - name: Install project tools
        run: |
          xlings update
          xlings install

      - name: Set default toolchain
        run: |
          mcpp toolchain install gcc 16.1.0
          mcpp toolchain default gcc@16.1.0
          mcpp --version

      - name: Build library (via compat.opencv5 source build)
        run: mcpp build

      - name: Run tests (API surface + macros mix + codec roundtrips)
        run: mcpp test

      - name: Run probe example (path-dep consumer)
        run: |
          cd examples/probe
          mcpp run

      - name: Run gray_pipeline example
        run: |
          cd examples/gray_pipeline
          mcpp run
